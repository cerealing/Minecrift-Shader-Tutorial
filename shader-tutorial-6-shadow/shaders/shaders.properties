clouds=off

sliders = WAVE_STRENGTH WAVE_SPEED DIFFUSE_BRDF VANILLA_METAL_CONPENSATE sun_illuminance \
OPEN_VOLUNMETRIC_CLOUDSCAPES CLOUD_RESOLUTIONs

screen.columns = 2
screen = \
[Debuge] <empty> \
[World]  <empty> \

    screen.Debuge.columns = 1
    screen.Debuge = [PBR] [Phong]
        screen.PBR.columns = 1
        screen.PBR = FRESNEL DIFFUSE_BRDF FORCIBLY_ENABLE_PBR FORCIBLY_ENABLE_VANILLA_PBR VANILLA_METAL_CONPENSATE

        screen.Phong.columns = 1
        screen.Phong = CLOSE_PBR_AND_OPEN_PHONG

    screen.World.columns = 1
    screen.World = [Wave] [LightColor] [Volunmetric_cloudscapes]
        screen.Wave.columns = 1
        screen.Wave = WAVE_STRENGTH WAVE_SPEED

        screen.LightColor.columns = 1
        screen.LightColor = [SunColor] [MoonColor]
            screen.SunColor.columns = 1
                screen.SunColor = sun_illuminance Sun_temp sunColorR sunColorG sunColorB
            screen.MoonColor.columns = 1
                screen.MoonColor = moon_illuminance Moon_temp moonColorR moonColorG moonColorB
        
        screen.Volunmetric_cloudscapes.columns = 1
        screen.Volunmetric_cloudscapes = OPEN_VOLUNMETRIC_CLOUDSCAPES CLOUD_RESOLUTION cloudBottom cloudTop



uniform.float.firstFrame = 1.0

variable.float.texelSizeX = 1.0/viewWidth
variable.float.texelSizeY = 1.0/viewHeight
uniform.vec2.texelSize = vec2(texelSizeX,texelSizeY)

#if CLOUD_RESOLUTION == 0.1
    size.buffer.colortex4 = 0.1 0.1
#endif

#if CLOUD_RESOLUTION == 0.25
    size.buffer.colortex4 = 0.25 0.25
#endif

#if CLOUD_RESOLUTION == 0.5
    size.buffer.colortex4 = 0.5 0.5
#endif

#if CLOUD_RESOLUTION == 0.75
    size.buffer.colortex4 = 0.75 0.75
#endif

#if CLOUD_RESOLUTION == 1.0
    size.buffer.colortex4 = 1.0 1.0
#endif  

